<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="header-title">Oskar Emde</a>

    <div class="profile-menu">
      <button class="profile-btn" id="profileBtn">
        <i class="fa-solid fa-user"></i>
        <span>Konto</span>
        <i class="fa-solid fa-chevron-down"></i>
      </button>

      <div class="dropdown-menu" id="dropdownMenu">
        <a href="profil.html"><i class="fa-solid fa-user"></i> Profil</a>

        <button type="button" id="themeToggle">
          <i class="fa-solid fa-moon"></i>
          <span>Light/Dark mode</span>
        </button>

        <a href="sponsorat.html"><i class="fa-solid fa-heart"></i> Støt</a>
        <a href="sponsorat.html"><i class="fa-solid fa-handshake"></i> Sponsorat</a>
        <a href="indstillinger.html"><i class="fa-solid fa-gear"></i> Indstillinger</a>
      </div>
    </div>
  </div>
</header>





<div class="layout">

  <aside class="sidebar">
    <h2 class="logo">Oskar Emde</h2>

    <nav>
      <a href="#startside" class="active">
        <i class="fa-solid fa-house"></i> Startside
      </a>

      <a href="#mine-projekter">
        <i class="fa-regular fa-folder-open"></i> Mine Projekter
      </a>

      <a href="#galleri">
        <i class="fa-solid fa-image"></i> Galleri
      </a>

      <a href="#om-mig">
        <i class="fa-solid fa-user"></i> Om Mig
      </a>

      <a href="#sociale-medier">
        <i class="fa-solid fa-hashtag"></i> Sociale Medier
      </a>

      <a href="#kontakt">
        <i class="fa-solid fa-envelope"></i> Kontakt
      </a>
    </nav>
  </aside>





  <main class="content">



    <section id="startside" class="startbillede">
      <div class="start-bg"></div>
      <div class="start-forgrund"></div>

      <div class="start-content">

      </div>
    </section>




    <section id="mine-projekter">
      <h1>Mine Projekter</h1>
    </section>

    <section id="galleri">
      <h1>Galleri</h1>

      <div class="cards">
        <div class="card grøn">Users<br><strong>2,341</strong></div>
        <div class="card pink">Orders<br><strong>456</strong></div>
        <div class="card gul">Conversion<br><strong>3.2%</strong></div>
      </div>

    </section>

    <section id="om-mig">
      <h1>Om Mig</h1>
    </section>

    <section id="sociale-medier">
      <h1>Sociale Medier</h1>
    </section>

    <section id="kontakt">
      <h1>Kontakt</h1>
    </section>

  </main>





</div>

<script src="js/script.js"></script>

</body>
</html>
